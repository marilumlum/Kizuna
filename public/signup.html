<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Inscription - Kizuna</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#DAD7CD;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    width:300px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    color:#344E41;
}

input{
    width:90%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#5C7650;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#344E41;
}

#signupMsg{
    margin-top:10px;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h2>Créer un compte Kizuna</h2>

<form id="signupForm">

<input type="text" id="username" placeholder="Pseudo" required>

<input type="email" id="email" placeholder="Email" required>

<input type="password" id="password" placeholder="Mot de passe" required>

<button type="submit">S'inscrire</button>

</form>

<div id="signupMsg"></div>

<br>

<a href="login.html">Déjà un compte ? Se connecter</a>

</div>

<script>

document.getElementById("signupForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const username = document.getElementById("username").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const res = await fetch("/signup", {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            username,
            email,
            password
        })
    });

    const data = await res.json();
    const msg = document.getElementById("signupMsg");

    if(data.error){
        msg.style.color="red";
        msg.innerText = data.error;
    }else{
        msg.style.color="green";
        msg.innerText = "Compte créé ! Redirection...";

        setTimeout(()=>{
            window.location.href = "/login.html";
        },1500);
    }

});

</script>

</body>
</html>
