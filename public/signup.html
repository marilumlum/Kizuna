<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Kizuna - Inscription</title>
<style>
body { font-family: Arial; background: #DAD7CD; color: #344E41; display:flex; justify-content:center; align-items:center; height:100vh; }
form { background: #5C7650; padding: 30px; border-radius: 15px; box-shadow:0 0 10px rgba(0,0,0,0.3); }
input, button { display:block; width: 250px; margin:10px auto; padding:10px; border-radius:10px; border:none; }
button { background:#A3B18A; cursor:pointer; }
</style>
</head>
<body>
<form id="signupForm">
<h2>Inscription Kizuna</h2>
<input type="text" name="username" placeholder="Pseudo" required>
<input type="email" name="email" placeholder="Email" required>
<input type="password" name="password" placeholder="Mot de passe" required>
<button type="submit">S'inscrire</button>
<p id="message"></p>
<p>Déjà inscrit ? <a href="login.html">Connexion</a></p>
</form>

<script>
document.getElementById("signupForm").onsubmit = async e => {
    e.preventDefault();
    const form = e.target;
    const res = await fetch("/signup", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username: form.username.value,
            email: form.email.value,
            password: form.password.value
        })
    });
    const data = await res.json();
    document.getElementById("message").textContent = data.error || data.message;
    if(data.message) setTimeout(()=>{location.href="login.html"},1000);
};
</script>
</body>
</html>
