<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>Kizuna</title>

<style>

body{
font-family:Arial;
margin:0;
display:flex;
height:100vh;
background:#DAD7CD;
}

/* sidebar contacts */

#contacts{
width:250px;
background:#344E41;
color:white;
padding:20px;
overflow-y:auto;
}

#contacts h3{
margin-top:0;
}

#contacts li{
list-style:none;
padding:10px;
cursor:pointer;
border-radius:5px;
}

#contacts li:hover{
background:#5C7650;
}

/* zone chat */

#chat{
flex:1;
display:flex;
flex-direction:column;
}

#chatHeader{
background:#A3B18A;
padding:15px;
font-weight:bold;
}

#messages{
flex:1;
padding:20px;
overflow-y:auto;
display:flex;
flex-direction:column;
}

/* bulles */

.message{
max-width:60%;
padding:10px 15px;
margin:5px 0;
border-radius:15px;
}

.me{
background:#5C7650;
color:white;
align-self:flex-end;
}

.other{
background:white;
align-self:flex-start;
}

/* input */

#form{
display:flex;
padding:10px;
background:#eee;
}

#form input{
flex:1;
padding:10px;
border:none;
border-radius:5px;
}

#form button{
margin-left:10px;
padding:10px 20px;
background:#5C7650;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="contacts">

<h3>Contacts</h3>

<ul id="userList"></ul>

</div>

<div id="chat">

<div id="chatHeader">
Sélectionne un contact
</div>

<div id="messages"></div>

<form id="form">

<input id="input" placeholder="Écrire un message...">

<button>Envoyer</button>

</form>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

let selectedUserId=null;

const messagesDiv=document.getElementById("messages");

/* charger utilisateurs */

async function loadUsers(){

const res=await fetch("/users");
const users=await res.json();

const list=document.getElementById("userList");

list.innerHTML="";

users.forEach(user=>{

const li=document.createElement("li");

li.textContent=user.username;

li.onclick=()=>selectUser(user.id,user.username);

list.appendChild(li);

});

}

/* selection contact */

async function selectUser(id,username){

selectedUserId=id;

document.getElementById("chatHeader").innerText="Chat avec "+username;

const res=await fetch("/messages/"+id);

const msgs=await res.json();

messagesDiv.innerHTML="";

msgs.forEach(m=>addMessage(m.sender_id===id? "other":"me",m.content));

}

/* ajouter message */

function addMessage(type,text){

const div=document.createElement("div");

div.classList.add("message",type);

div.innerText=text;

messagesDiv.appendChild(div);

messagesDiv.scrollTop=messagesDiv.scrollHeight;

}

/* envoyer message */

document.getElementById("form").addEventListener("submit",function(e){

e.preventDefault();

const input=document.getElementById("input");

if(!input.value || !selectedUserId) return;

socket.emit("private message",{

receiverId:selectedUserId,

content:input.value

});

addMessage("me",input.value);

input.value="";

});

/* recevoir message */

socket.on("private message",msg=>{

addMessage("other",msg.content);

});

loadUsers();

</script>

</body>

</html>
