<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion - Kizuna</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#DAD7CD;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    width:300px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    color:#344E41;
}

input{
    width:90%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#5C7650;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#344E41;
}

#loginMsg{
    margin-top:10px;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Connexion Kizuna</h2>

<form id="loginForm">

<input type="text" id="username" placeholder="Pseudo" required>

<input type="password" id="password" placeholder="Mot de passe" required>

<button type="submit">Se connecter</button>

</form>

<div id="loginMsg"></div>

<br>

<a href="signup.html">Créer un compte</a>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const res = await fetch("/login", {

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body: JSON.stringify({
            username,
            password
        })

    });

    const data = await res.json();

    const msg = document.getElementById("loginMsg");

    if(data.error){

        msg.style.color="red";
        msg.innerText=data.error;

    }else{

        msg.style.color="green";
        msg.innerText="Connexion réussie";

        setTimeout(()=>{

            window.location.href="/index.html";

        },1000);

    }

});

</script>

</body>
</html>
